# Monitors as code. This file is the source of truth; `sync_monitors.py`
# reconciles Uptime Kuma to match it (creates missing, updates drifted, and
# with --prune removes managed monitors no longer listed here).
#
# `name` is the identity key — the script matches existing monitors by name, so
# renaming a monitor here creates a new one (and prunes the old, with --prune).
#
# Supported types: http, port, ping, docker, push. `defaults` are applied to
# every monitor unless the monitor overrides them.
#
# HTTP monitors reach services via the host's published ports, so they use the
# NAS LAN IP (192.168.68.105) rather than "nas", which won't resolve inside the
# Kuma container.

defaults:
  interval: 60          # seconds between checks
  retryInterval: 60     # seconds between retries once down
  maxretries: 1         # failed checks before marking DOWN (debounces blips)

# Docker hosts Kuma uses for "docker" monitors. Referenced by name below.
docker_hosts:
  - name: local
    type: socket                       # socket | tcp
    daemon: /var/run/docker.sock       # socket path, or tcp://host:2375

monitors:
  # ============ alphaess-collector stack ============

  # End-to-end "data is actually flowing": the collector pings this Push monitor
  # after each successful InfluxDB write. Catches a stuck-but-alive collector
  # that plain container/HTTP checks miss. Set HEARTBEAT_URL in the collector's
  # .env to the URL this monitor prints on creation.
  - name: AlphaESS collector heartbeat
    type: push
    interval: 60          # grace window; keep > collector POLL_INTERVAL_SECONDS

  # InfluxDB up (HTTP /health returns 200 on Influx 2.x).
  - name: InfluxDB
    type: http
    url: http://192.168.68.105:8086/health

  # Grafana up (/api/health returns 200). This NAS uses the shared-Grafana
  # overlay: the alphaess dashboards live in the TeslaMate Grafana on :3000.
  - name: Grafana
    type: http
    url: http://192.168.68.105:3000/api/health

  # Containers actually running (catches a crashed/exited container).
  - name: collector container
    type: docker
    docker_container: alphaess-collector-collector-1
    docker_host: local

  - name: influxdb container
    type: docker
    docker_container: alphaess-collector-influxdb-1
    docker_host: local

  - name: awtrix-pusher container
    type: docker
    docker_container: alphaess-collector-awtrix-pusher-1
    docker_host: local

  # Shared Grafana serving the alphaess dashboards.
  - name: grafana container
    type: docker
    docker_container: teslamate-grafana-1
    docker_host: local

  # ============ NAS itself ============

  - name: NAS reachable
    type: ping
    hostname: 192.168.68.105

  # ============ Dead-man's switch for THIS monitor host ============
  # Kuma generates the push URL after creation; the script prints it so you can
  # paste it into healthchecks.io (external alert if the whole NAS dies).
  - name: Monitor host heartbeat
    type: push
    interval: 60
